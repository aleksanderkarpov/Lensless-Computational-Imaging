device: "auto"
train:
  - _target_: src.metrics.ImageMetric
    metric:
      _target_: torchmetrics.PeakSignalNoiseRatio
      data_range: 1.0
    device: ${metrics.device}
    normalize: ${normalize}
    name: "PSNR"
inference:
  - _target_: src.metrics.ImageMetric
    metric:
      _target_: torchmetrics.PeakSignalNoiseRatio
      data_range: 1.0
    device: ${metrics.device}
    normalize: ${normalize}
    name: "PSNR"
  - _target_: src.metrics.ImageMetric
    metric:
      _target_: torchmetrics.MeanSquaredError
    device: ${metrics.device}
    normalize: ${normalize}
    name: "MSE"
  - _target_: src.metrics.ImageMetric
    metric:
      _target_: torchmetrics.StructuralSimilarityIndexMeasure
      data_range: 1.0
    device: ${metrics.device}
    normalize: ${normalize}
    name: "SSIM"
  - _target_: src.metrics.ImageMetric
    metric:
      _target_: torchmetrics.image.LearnedPerceptualImagePatchSimilarity
      net_type: vgg
      normalize: true
    device: ${metrics.device}
    normalize: ${normalize}
    name: "LPIPS"
