defaults:
  - model: admm
  - writer: cometml
  - metrics: lensless
  - datasets: digicam_eval # we do not want to run inference on training data
  - dataloader: example
  - transforms: none
  - _self_
normalize: true
inferencer:
  device_tensors: ["lensless", "lensed", "psf"] # which tensors should be on device (ex. GPU)
  device: auto # device name or "auto"
  save_path: "admm" # any name here, can be a dataset name
  seed: 1
  from_pretrained: null # path to the pretrained model
